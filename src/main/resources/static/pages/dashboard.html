<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - XYZ Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-body">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg dashboard-navbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="#">
            <i class="bi bi-bank2"></i> XYZ Bank
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white" id="navUserName"></span>
            <button onclick="logout()"
                    class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row g-4">

        <!-- Profile Card -->
        <div class="col-md-4">
            <div class="profile-card">
                <div class="profile-photo-container">
                    <img id="profilePhoto"
                         src="../assets/default-avatar.png"
                         alt="Profile Photo"
                         class="profile-photo">
                </div>
                <h4 id="profileName" class="mt-3"></h4>
                <p id="profileEmail" class="text-muted"></p>

                <div class="profile-details mt-3">
                    <div class="profile-detail-row">
                        <i class="bi bi-credit-card"></i>
                        <span id="profileAccountNumber"></span>
                    </div>
                    <div class="profile-detail-row">
                        <i class="bi bi-building"></i>
                        <span>XYZ Bank</span>
                    </div>
                    <div class="profile-detail-row">
                        <i class="bi bi-geo-alt"></i>
                        <span>Main Branch</span>
                    </div>
                    <div class="profile-detail-row">
                        <i class="bi bi-hash"></i>
                        <span>IFSC: XYZ0001234</span>
                    </div>
                    <div class="profile-detail-row">
                        <i class="bi bi-phone"></i>
                        <span id="profilePhone"></span>
                    </div>
                    <div class="profile-detail-row">
                        <i class="bi bi-wallet2"></i>
                        <span id="profileAccountType"></span>
                    </div>
                </div>

                <div class="balance-display mt-3">
                    <p class="balance-label">Current Balance</p>
                    <h3 class="balance-amount">
                        ₹<span id="profileBalance">0.00</span>
                    </h3>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="col-md-8">
            <h5 class="mb-3">Quick Actions</h5>
            <div class="row g-3">

                <div class="col-md-4">
                    <div class="action-card"
                         onclick="window.location.href='deposit.html'">
                        <i class="bi bi-arrow-down-circle action-icon deposit-icon"></i>
                        <h6>Deposit</h6>
                        <p>Add money to account</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="action-card"
                         onclick="window.location.href='withdraw.html'">
                        <i class="bi bi-arrow-up-circle action-icon withdraw-icon"></i>
                        <h6>Withdraw</h6>
                        <p>Take money out</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="action-card"
                         onclick="window.location.href='transfer.html'">
                        <i class="bi bi-arrow-left-right action-icon transfer-icon"></i>
                        <h6>Transfer</h6>
                        <p>Send money</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="action-card"
                         onclick="window.location.href='balance.html'">
                        <i class="bi bi-wallet2 action-icon balance-icon"></i>
                        <h6>Check Balance</h6>
                        <p>View your balance</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="action-card"
                         onclick="window.location.href='history.html'">
                        <i class="bi bi-clock-history action-icon history-icon"></i>
                        <h6>Transactions</h6>
                        <p>View history</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="action-card"
                         onclick="window.location.href='bank-details.html'">
                        <i class="bi bi-building action-icon bank-icon"></i>
                        <h6>Bank Details</h6>
                        <p>Branch information</p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="../js/dashboard.js"></script>
</body>
</html>
