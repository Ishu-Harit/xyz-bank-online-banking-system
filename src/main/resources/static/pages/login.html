<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - XYZ Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
<div class="container-fluid vh-100">
    <div class="row vh-100">

        <!-- Left Side -->
        <div class="col-md-6 auth-left d-flex align-items-center justify-content-center">
            <div class="text-center text-white">
                <i class="bi bi-bank2 display-1"></i>
                <h2 class="mt-3">XYZ Bank</h2>
                <p>Your Trusted Banking Partner</p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="col-md-6 d-flex align-items-center justify-content-center">
            <div class="auth-form-container">
                <h3 class="auth-title">Welcome Back!</h3>
                <p class="auth-subtitle">Login to your account</p>

                <div id="errorMsg" class="alert alert-danger d-none"></div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                        <input type="email" id="email"
                               class="form-control" placeholder="Enter email">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                        <input type="password" id="password"
                               class="form-control" placeholder="Enter password">
                    </div>
                </div>

                <button onclick="login()"
                        class="btn btn-primary w-100 auth-btn">
                    Login
                </button>

                <p class="text-center mt-3">
                    New User?
                    <a href="register.html" class="auth-link">Register Here</a>
                </p>
            </div>
        </div>

    </div>
</div>
<script src="../js/login.js"></script>
</body>
</html>
