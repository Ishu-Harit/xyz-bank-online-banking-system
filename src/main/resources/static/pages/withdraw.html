<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - XYZ Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-body">

<!-- Navbar -->
<nav class="navbar dashboard-navbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="dashboard.html">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
        <span class="navbar-brand text-white">
                <i class="bi bi-bank2"></i> XYZ Bank
            </span>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="transaction-card">
                <div class="transaction-icon withdraw-icon-bg">
                    <i class="bi bi-arrow-up-circle"></i>
                </div>
                <h4 class="text-center mt-3">Withdraw Money</h4>
                <p class="text-center text-muted">
                    Withdraw money from your account
                </p>

                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div id="successMsg" class="alert alert-success d-none"></div>

                <div class="mb-3 mt-4">
                    <label class="form-label">Amount (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" id="amount"
                               class="form-control"
                               placeholder="Enter amount">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Description (Optional)
                    </label>
                    <input type="text" id="description"
                           class="form-control"
                           placeholder="Enter description">
                </div>

                <button onclick="withdraw()"
                        class="btn btn-danger w-100 auth-btn">
                    <i class="bi bi-arrow-up-circle"></i>
                    Withdraw Now
                </button>
            </div>
        </div>
    </div>
</div>

<script src="../js/withdraw.js"></script>
</body>
</html>
