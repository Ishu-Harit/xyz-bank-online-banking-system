<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Balance - XYZ Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-body">

<!-- Navbar -->
<nav class="navbar dashboard-navbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="dashboard.html">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
        <span class="navbar-brand text-white">
                <i class="bi bi-bank2"></i> XYZ Bank
            </span>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="balance-card text-center">
                <i class="bi bi-wallet2 balance-card-icon"></i>
                <h4 class="mt-3">Current Balance</h4>
                <div class="balance-amount-display mt-4">
                    <span class="currency-symbol">₹</span>
                    <span id="balanceAmount">Loading...</span>
                </div>
                <p class="text-muted mt-3" id="accountNumberDisplay"></p>
                <p class="text-muted">
                    Last Updated:
                    <span id="lastUpdated"></span>
                </p>
                <button onclick="refreshBalance()"
                        class="btn btn-primary mt-3">
                    <i class="bi bi-arrow-clockwise"></i>
                    Refresh
                </button>
            </div>
        </div>
    </div>
</div>

<script src="../js/balance.js"></script>
</body>
</html>
