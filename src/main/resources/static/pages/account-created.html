<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Created - XYZ Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
<div class="container d-flex align-items-center
                justify-content-center vh-100">
    <div class="account-created-card text-center">

        <div class="success-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>

        <h2 class="mt-3">Account Created Successfully!</h2>
        <p class="text-muted">Welcome to XYZ Bank family</p>

        <div class="account-details-box mt-4">
            <div class="detail-row">
                <span class="detail-label">Account Holder</span>
                <span class="detail-value" id="userName"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Account Number</span>
                <span class="detail-value" id="accountNumber"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Account Type</span>
                <span class="detail-value" id="accountType"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Bank Name</span>
                <span class="detail-value">XYZ Bank</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Branch</span>
                <span class="detail-value">Main Branch</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">IFSC Code</span>
                <span class="detail-value">XYZ0001234</span>
            </div>
        </div>

        <p class="text-warning mt-3">
            <i class="bi bi-exclamation-triangle"></i>
            Please save your account details safely!
        </p>

        <button onclick="goToDashboard()"
                class="btn btn-primary w-100 auth-btn mt-3">
            OK — Go to Dashboard
        </button>

    </div>
</div>
<script src="../js/register.js"></script>
</body>
</html>
