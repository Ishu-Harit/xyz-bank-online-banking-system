<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - XYZ Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
<div class="container-fluid vh-100">
    <div class="row vh-100">

        <!-- Left Side -->
        <div class="col-md-6 auth-left d-flex align-items-center justify-content-center">
            <div class="text-center text-white">
                <i class="bi bi-bank2 display-1"></i>
                <h2 class="mt-3">XYZ Bank</h2>
                <p>Open Your Account Today!</p>
                <ul class="text-start mt-3">
                    <li>Zero Balance Account</li>
                    <li>Free Debit Card</li>
                    <li>24/7 Banking</li>
                    <li>Instant Account Opening</li>
                </ul>
            </div>
        </div>

        <!-- Right Side -->
        <div class="col-md-6 d-flex align-items-center
                        justify-content-center py-4">
            <div class="auth-form-container">
                <h3 class="auth-title">Create Account</h3>
                <p class="auth-subtitle">Fill in your details below</p>

                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div id="successMsg" class="alert alert-success d-none"></div>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                        <input type="text" id="name"
                               class="form-control" placeholder="Enter full name">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                        <input type="email" id="email"
                               class="form-control" placeholder="Enter email">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                        <input type="password" id="password"
                               class="form-control" placeholder="Enter password">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-phone"></i>
                            </span>
                        <input type="text" id="phone"
                               class="form-control" placeholder="Enter phone number">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Account Type</label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-credit-card"></i>
                            </span>
                        <select id="accountType" class="form-select">
                            <option value="Saving">Saving Account</option>
                            <option value="Current">Current Account</option>
                        </select>
                    </div>
                </div>

                <button onclick="register()"
                        class="btn btn-primary w-100 auth-btn">
                    Create Account
                </button>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="login.html" class="auth-link">Login Here</a>
                </p>
            </div>
        </div>

    </div>
</div>
<script src="../js/register.js"></script>
</body>
</html>
